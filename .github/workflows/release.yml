name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract latest changelog section
        run: |
          awk '
            /^\*\*[0-9]/ {
              count++
              if (count > 3) exit
              if (count > 1) {
                print ""
                print "---"
                print ""
              }
            }
            count > 0 { print }
          ' CHANGELOG_LIVE.md > .release_changelog.md
          echo "--- Release changelog ---"
          cat .release_changelog.md

      - name: Package and Upload
        uses: BigWigsMods/packager@v2
        with:
          args: -n "{package-name}-{project-version}{nolib}{classic}:{package-name} {project-version}"
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
